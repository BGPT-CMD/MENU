<!DOCTYPE html>
<html>
<head>
  <title>A + B's Cafe</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5e6d3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .welcome-box {
      text-align: center;
      padding: 40px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .welcome-box:hover {
      transform: scale(1.05);
    }

    h1 {
      font-size: 2.5em;
      margin: 0;
    }

    p {
      margin-top: 10px;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="welcome-box" onclick="goToMenu()">
    <h1>Welcome to A + B's Cafe</h1>
    <p>Click to enter</p>
  </div>

  <script>
    function goToMenu() {
      window.location.href = "menu.html";
    }
  </script>

</body>
</html>
